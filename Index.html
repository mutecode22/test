<<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국인 인생 난이도 판독기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#09090b;
  --card:#111113;
  --border:#222226;
  --text:#f4f4f5;
  --muted:#71717a;
  --easy:#22c55e;
  --hard:#ef4444;
  --mid:#f59e0b;
}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 16px 60px;
}

/* ── INTRO ── */
#intro{text-align:center;max-width:480px;padding-top:40px;}
.intro-icon{font-size:3.5rem;margin-bottom:16px;display:block;}
.intro-title{
  font-size:1.7rem;font-weight:900;letter-spacing:-1px;
  margin-bottom:8px;line-height:1.2;
}
.intro-title em{
  font-style:normal;
  background:linear-gradient(90deg,#ef4444,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.intro-sub{font-size:0.8rem;color:var(--muted);line-height:1.7;margin-bottom:28px;}
.start-btn{
  background:#f4f4f5;color:#09090b;
  border:none;border-radius:10px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:1rem;font-weight:700;
  padding:14px 40px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,255,255,.1);}

/* ── QUIZ ── */
#quiz{display:none;width:100%;max-width:520px;}

.progress-wrap{margin-bottom:28px;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-label{font-size:0.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;}
.progress-count{font-size:0.7rem;color:var(--muted);}
.progress-bar-bg{
  width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;
}
.progress-bar-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,#ef4444,#f59e0b);
  transition:width .4s ease;
}

.category-badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:0.62rem;font-weight:700;margin-bottom:10px;
  background:#1c1c1e;border:1px solid var(--border);color:var(--muted);
}

.question-num{font-size:0.65rem;color:var(--muted);margin-bottom:6px;}
.question-text{
  font-size:1.05rem;font-weight:700;line-height:1.5;
  margin-bottom:20px;
}

.options{display:flex;flex-direction:column;gap:8px;}

.opt-btn{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  font-size:0.82rem;
  padding:13px 16px;
  text-align:left;
  cursor:pointer;
  transition:all .15s;
  line-height:1.4;
  display:flex;align-items:flex-start;gap:10px;
}
.opt-btn .opt-letter{
  width:22px;height:22px;border-radius:6px;
  background:var(--border);color:var(--muted);
  font-size:0.65rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  margin-top:1px;
}
.opt-btn:hover{border-color:#f59e0b;background:#1a1700;}
.opt-btn:hover .opt-letter{background:#f59e0b;color:#000;}
.opt-btn.selected{border-color:#22c55e;background:#001a0a;}
.opt-btn.selected .opt-letter{background:#22c55e;color:#000;}

.back-btn{
  background:transparent;border:none;
  color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:0.75rem;cursor:pointer;padding:4px 0;
  display:flex;align-items:center;gap:4px;
  margin-bottom:16px;transition:color .15s;
}
.back-btn:hover{color:var(--text);}
.back-btn.hidden{visibility:hidden;}

/* ── LOADING ── */
#loading{
  display:none;text-align:center;padding-top:80px;
}
.loading-icon{font-size:3rem;animation:spin 1s linear infinite;display:block;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:0.85rem;color:var(--muted);}

/* ── RESULT ── */
#result{display:none;width:100%;max-width:520px;}

.result-header{text-align:center;padding:32px 0 24px;}
.result-badge{
  display:inline-block;padding:4px 14px;border-radius:20px;
  font-size:0.65rem;font-weight:700;letter-spacing:2px;
  margin-bottom:14px;
}
.result-type-name{
  font-size:2rem;font-weight:900;letter-spacing:-1px;
  margin-bottom:6px;line-height:1.1;
}
.result-type-sub{font-size:0.8rem;color:var(--muted);margin-bottom:20px;}

/* difficulty meter */
.diff-meter{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:20px;margin-bottom:12px;
  text-align:center;
}
.diff-label{font-size:0.65rem;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:10px;}
.diff-score-wrap{position:relative;margin-bottom:10px;}
.diff-score-big{font-size:3.5rem;font-weight:900;line-height:1;}
.diff-score-max{font-size:0.8rem;color:var(--muted);}
.diff-bar-bg{
  width:100%;height:10px;background:var(--border);border-radius:5px;
  overflow:hidden;margin-bottom:8px;
}
.diff-bar-fill{height:100%;border-radius:5px;transition:width 1s ease;}
.diff-grade{font-size:1.1rem;font-weight:700;}

/* breakdown */
.breakdown{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;
}
.bk-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px;
}
.bk-cat{font-size:0.6rem;color:var(--muted);font-weight:700;margin-bottom:4px;}
.bk-score{font-size:1.1rem;font-weight:700;}
.bk-bar{height:4px;border-radius:2px;margin-top:6px;transition:width 1s ease;}

/* desc card */
.desc-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:18px;margin-bottom:12px;
}
.desc-card h3{font-size:0.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:10px;}
.desc-text{font-size:0.82rem;line-height:1.8;color:#d4d4d8;}

/* famous */
.famous-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:18px;margin-bottom:20px;
}
.famous-card h3{font-size:0.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:10px;}
.famous-list{display:flex;flex-direction:column;gap:6px;}
.famous-item{
  display:flex;align-items:center;gap:10px;
  font-size:0.78rem;padding:8px;border-radius:8px;background:#0a0a0b;
}
.famous-emoji{font-size:1.1rem;}
.famous-name{font-weight:700;}
.famous-desc{font-size:0.65rem;color:var(--muted);}

.share-btn{
  width:100%;padding:14px;border-radius:10px;border:none;
  font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:700;
  cursor:pointer;background:#f4f4f5;color:#09090b;
  margin-bottom:8px;transition:transform .15s;
}
.share-btn:hover{transform:translateY(-1px);}
.retry-btn{
  width:100%;padding:12px;border-radius:10px;
  border:1.5px solid var(--border);background:transparent;
  color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:0.85rem;cursor:pointer;
}
.retry-btn:hover{border-color:var(--text);color:var(--text);}

/* ── BODY INFO ── */
#bodyinfo{display:none;width:100%;max-width:420px;text-align:center;padding-top:20px;}
.bodyinfo-title{font-size:1.2rem;font-weight:900;margin-bottom:6px;}
.bodyinfo-sub{font-size:0.75rem;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.gender-wrap{display:flex;gap:12px;justify-content:center;margin-bottom:24px;}
.gender-btn{
  flex:1;max-width:160px;padding:16px;border-radius:12px;
  border:2px solid var(--border);background:var(--card);
  color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:1rem;font-weight:700;cursor:pointer;transition:all .15s;
}
.gender-btn:hover{border-color:#f59e0b;}
.gender-btn.selected{border-color:#f59e0b;background:#1a1500;}
.gender-btn .g-icon{font-size:2rem;display:block;margin-bottom:6px;}
.input-group{margin-bottom:16px;text-align:left;}
.input-label{font-size:0.7rem;color:var(--muted);font-weight:700;margin-bottom:6px;display:block;}
.input-row{display:flex;gap:8px;align-items:center;}
.num-input{
  flex:1;background:var(--card);border:1.5px solid var(--border);
  border-radius:8px;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:700;
  padding:12px 14px;outline:none;transition:border .15s;
}
.num-input:focus{border-color:#f59e0b;}
.input-unit{font-size:0.8rem;color:var(--muted);flex-shrink:0;}
.bmi-preview{
  margin-top:12px;padding:10px;border-radius:8px;
  background:var(--card);border:1px solid var(--border);
  font-size:0.75rem;color:var(--muted);text-align:center;min-height:36px;
}
.confirm-btn{
  width:100%;margin-top:8px;padding:14px;border-radius:10px;border:none;
  background:#f4f4f5;color:#09090b;
  font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;transition:transform .15s;
}
.confirm-btn:hover{transform:translateY(-1px);}
.confirm-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <span class="intro-icon">🎰</span>
  <h1 class="intro-title">한국인<br><em>인생 난이도</em> 판독기</h1>
  <p class="intro-sub">
    30가지 질문으로 당신의 한국 인생이<br>
    얼마나 어려운 난이도인지 측정합니다.<br>
    솔직하게 답할수록 정확합니다.
  </p>
  <button class="start-btn" onclick="goBodyInfo()">판독 시작하기 →</button>
</div>

<!-- BODY INFO -->
<div id="bodyinfo">
  <div class="bodyinfo-title">기본 정보 입력</div>
  <div class="bodyinfo-sub">한국 사회에서 외모·체형은 현실적으로<br>삶에 영향을 줍니다. 솔직하게 입력해주세요.</div>

  <div class="gender-wrap">
    <button class="gender-btn" id="btn-male" onclick="selectGender('male')">
      <span class="g-icon">👨</span>남자
    </button>
    <button class="gender-btn" id="btn-female" onclick="selectGender('female')">
      <span class="g-icon">👩</span>여자
    </button>
  </div>

  <div class="input-group">
    <label class="input-label">키</label>
    <div class="input-row">
      <input class="num-input" type="number" id="inp-height" placeholder="" min="140" max="220" oninput="updateBMI()">
      <span class="input-unit">cm</span>
    </div>
  </div>

  <div class="input-group">
    <label class="input-label">몸무게</label>
    <div class="input-row">
      <input class="num-input" type="number" id="inp-weight" placeholder="" min="30" max="200" oninput="updateBMI()">
      <span class="input-unit">kg</span>
    </div>
  </div>

  <div class="bmi-preview" id="bmi-preview">키와 몸무게를 입력하면 분석됩니다</div>

  <button class="confirm-btn" id="confirm-btn" onclick="startQuiz()" disabled>테스트 시작 →</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <button class="back-btn hidden" id="back-btn" onclick="goBack()">← 이전 질문</button>
  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label">LIFE DIFFICULTY TEST</span>
      <span class="progress-count" id="prog-count">1 / 30</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-fill" style="width:3%"></div>
    </div>
  </div>
  <div class="category-badge" id="q-category">출생환경</div>
  <div class="question-num" id="q-num">Q1</div>
  <div class="question-text" id="q-text"></div>
  <div class="options" id="q-options"></div>
</div>

<!-- LOADING -->
<div id="loading">
  <span class="loading-icon">⚙️</span>
  <div class="loading-text">인생 난이도를 계산하는 중...</div>
</div>

<!-- RESULT -->
<div id="result"></div>

<script>
// ── QUESTIONS (30개) ────────────────────────────────────────────
// score: 높을수록 난이도 높음 (0~10)
// category: 출생/교육/경제/사회/직업/주거/관계/멘탈

const QUESTIONS = [
  // 출생환경 (1-5, 성별 질문 삭제)
  {
    cat:'👶 출생환경', text:'부모님의 경제적 수준은?',
    opts:[
      {t:'재산 수십억+, 건물주·사업체 보유', s:0},
      {t:'연봉 1억+ 전문직 (의사·변호사·교수)', s:2},
      {t:'평범한 맞벌이, 아파트 한 채', s:4},
      {t:'외벌이, 빠듯한 살림', s:6},
      {t:'월세·전세, 빚 있는 가정', s:8},
      {t:'기초생활수급·차상위계층', s:10},
    ]
  },
  {
    cat:'👶 출생환경', text:'태어난 지역은?',
    opts:[
      {t:'서울 강남3구 (강남·서초·송파)', s:0},
      {t:'서울 기타 지역 (마포·용산·성동 등)', s:2},
      {t:'서울 외곽 (노원·도봉·강북)', s:3},
      {t:'수도권 (경기·인천)', s:5},
      {t:'지방 광역시 (부산·대구·광주 등)', s:7},
      {t:'지방 중소도시·농어촌', s:10},
    ]
  },
  {
    cat:'👶 출생환경', text:'외모에 대한 솔직한 평가는?',
    opts:[
      {t:'어딜 가든 예쁘다·잘생겼다는 말 듣는다', s:0},
      {t:'평균 이상이라는 말을 자주 듣는다', s:2},
      {t:'그냥 평범한 외모', s:4},
      {t:'외모로 불이익을 받은 적 있다', s:6},
      {t:'외모 콤플렉스가 삶에 큰 영향을 준다', s:8},
      {t:'외모 때문에 차별·괴롭힘을 경험했다', s:10},
    ]
  },
  {
    cat:'👶 출생환경', text:'부모님의 교육 수준은?',
    opts:[
      {t:'부모 둘 다 대졸+, 교육열 매우 높음', s:0},
      {t:'한 명 이상 대졸, 교육에 적극적', s:2},
      {t:'고졸이지만 자녀 교육에 관심 있음', s:4},
      {t:'학력 낮고 교육 지원 어려움', s:6},
      {t:'교육에 무관심, 방치에 가까움', s:8},
      {t:'부모 부재 (이혼·사망·방치)', s:10},
    ]
  },
  {
    cat:'👶 출생환경', text:'형제·자매는 몇 명?',
    opts:[
      {t:'외동 (모든 자원이 나에게 집중)', s:0},
      {t:'1명 (2남매)', s:2},
      {t:'2명 (3남매)', s:4},
      {t:'3명 (4남매)', s:6},
      {t:'4명 이상', s:8},
      {t:'6명 이상 대가족', s:10},
    ]
  },
  // 교육 (6-10)
  {
    cat:'📚 교육', text:'다닌 초·중·고등학교 수준은?',
    opts:[
      {t:'강남권 8학군 또는 유명 사립학교', s:0},
      {t:'서울 일반 공립학교', s:2},
      {t:'수도권 일반 학교', s:4},
      {t:'지방 일반 학교', s:6},
      {t:'학교 환경이 열악했다', s:8},
      {t:'학교를 제대로 못 다녔다', s:10},
    ]
  },
  {
    cat:'📚 교육', text:'사교육(학원·과외)을 얼마나 받았나?',
    opts:[
      {t:'과목별 1:1 과외, 월 300만원 이상', s:0},
      {t:'여러 학원 꾸준히, 월 100만원 이상', s:2},
      {t:'학원 2~3개 다녔다', s:4},
      {t:'학원 1개만 다녔다', s:6},

    ]

  {
    cat:'📚 교육', text:'수능 성적과 진학한 대학은?',
    opts:[
      {t:'1등급 → SKY 진학', s:0},
      {t:'2등급 → 인서울 중상위 (성균관·한양·이화 등)', s:2},
      {t:'3~4등급 → 지방 국립대·인서울 하위', s:4},

      {t:'7등급 이하 또는 재수·N수', s:8},

    ]
  },
  {
    cat:'📚 교육', text:'학자금 대출이 있었나?',

      {t:'부모님이 전액 지원, 대출 없음', s:0},
      {t:'소액 대출, 졸업 후 1년 내 상환', s:2},

      {t:'대출이 많아 사회생활 시작부터 빚더미', s:10},
    ]
  },
  // 경제 (11-15)
  {
    cat:'💰 경제', text:'첫 직장 연봉은?',
    opts:[
      {t:'7000만원 이상', s:0},
      {t:'5000~7000만원', s:2},
      {t:'3500~5000만원', s:4},
      {t:'2500~3500만원', s:6},
      {t:'2500만원 미만', s:8},
      {t:'첫 직장 구하는 데 1년 이상 걸렸다', s:10},
    ]
  },
  {
    cat:'💰 경제', text:'현재 자산 수준은?',
    opts:[
      {t:'부동산 포함 20억 이상', s:0},
      {t:'10~20억', s:2},
      {t:'3~10억 (내 집 있음)', s:4},
      {t:'1~3억 (전세·적금)', s:6},
      {t:'1억 미만, 월세 생활', s:8},
      {t:'빚이 자산보다 많다', s:10},
    ]
  },
  {
    cat:'💰 경제', text:'부모님에게 경제적 지원을 받은 적 있나?',

// 점수별 개인화 감동 메시지
function getPersonalMsg(score) {
  if(score <= 19) return '당신이 가진 것들은 많은 사람들의 꿈입니다. 그 행운을 어떻게 쓸지가 당신의 진짜 이야기를 만듭니다. 가진 것을 당연하게 여기지 않는 사람이 되길 바랍니다.';
  if(score <= 36) return '완벽하진 않았지만, 당신에게는 버텨낼 힘의 기반이 있었습니다. 지금의 자리는 그 기반 위에 당신이 쌓아올린 것입니다. 그걸 잊지 마세요.';
  if(score <= 53) return '한국에서 평균으로 산다는 건 결코 쉬운 일이 아닙니다. 매일 출근하고, 버티고, 다음 달을 준비하는 것 — 그 반복이 실은 대단한 일입니다. 당신은 충분히 열심히 살고 있습니다.';
  if(score <= 69) return '당신이 지금 서 있는 자리까지 오는 데 남들보다 훨씬 많은 것을 내줬을 겁니다. 포기하고 싶었던 순간이 분명 있었을 텐데, 그럼에도 여기까지 왔습니다. 그 사실이 이미 당신이 얼마나 강한 사람인지 말해줍니다.';
  if(score <= 86) return '이 점수는 단순한 숫자가 아닙니다. 당신이 감당해온 무게의 기록입니다. 남들 눈에는 보이지 않는 싸움을 혼자 해온 당신에게, 진심으로 수고했다고 말하고 싶습니다.';
  return '당신이 오늘 이 테스트를 하고 있다는 것 자체가, 아직 살아가고 있다는 증거입니다. 많이 지쳐있을 텐데 여기까지 버텨줘서 고맙습니다. 당신의 삶은 숫자로 측정될 수 없습니다.';
}

// 유명인 풀에서 랜덤 3명 추출
function pickRandom(pool, n) {
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

let current = 0;
let scores = [];

let answerHistory = []; // {score, cat} 기록
let selectedGender = null;
let bodyScore = 0;
const catScores = {"👶 출생환경":0,"📚 교육":0,"💰 경제":0,"💼 직업":0,"🏠 주거":0,"❤️ 관계":0,"🧠 멘탈·건강":0};

function goBodyInfo(){
  document.getElementById("intro").style.display="none";
  document.getElementById("bodyinfo").style.display="block";
}

function selectGender(g){
  selectedGender = g;
  document.getElementById("btn-male").classList.toggle("selected", g==="male");
  document.getElementById("btn-female").classList.toggle("selected", g==="female");
  updateBMI();
}

function updateBMI(){
  const h = parseFloat(document.getElementById("inp-height").value);
  const w = parseFloat(document.getElementById("inp-weight").value);
  const preview = document.getElementById("bmi-preview");
  const btn = document.getElementById("confirm-btn");
  if(!selectedGender){preview.textContent="성별을 먼저 선택해주세요";btn.disabled=true;return;}
  if(!h||!w||h<140||h>220||w<30||w>200){preview.textContent="키와 몸무게를 입력해주세요";btn.disabled=true;return;}
  const bmi=w/((h/100)**2);
  let score=0,msg="";
  if(selectedGender==="male"){
    let hScore=0,hMsg="";
    if(h>=183){hScore=0;hMsg="키 "+h+"cm 상위권";}
    else if(h>=175){hScore=1;hMsg="키 "+h+"cm 평균 이상";}
    else if(h>=170){hScore=3;hMsg="키 "+h+"cm 평균";}
    else if(h>=165){hScore=5;hMsg="키 "+h+"cm 평균 이하";}
    else{hScore=6;hMsg="키 "+h+"cm 불이익 상당";}
    let bScore=0,bMsg="";
    if(bmi<18.5){bScore=1;bMsg="BMI "+bmi.toFixed(1)+" 저체중";}
    else if(bmi<23){bScore=0;bMsg="BMI "+bmi.toFixed(1)+" 정상";}
    else if(bmi<25){bScore=1;bMsg="BMI "+bmi.toFixed(1)+" 약간 과체중";}
    else if(bmi<28){bScore=2;bMsg="BMI "+bmi.toFixed(1)+" 과체중";}
    else if(bmi<30){bScore=3;bMsg="BMI "+bmi.toFixed(1)+" 비만";}
    else{bScore=4;bMsg="BMI "+bmi.toFixed(1)+" 고도비만";}
    score=hScore+bScore;
    msg=hMsg+" / "+bMsg+" → 합산 "+score+"점";
  }else{
    if(bmi<18.5){score=1;msg="BMI "+bmi.toFixed(1)+" — 저체중, 마름 선호 사회에서 유리";}
    else if(bmi<21){score=0;msg="BMI "+bmi.toFixed(1)+" — 한국 미적 기준 이상적 범위";}
    else if(bmi<23){score=3;msg="BMI "+bmi.toFixed(1)+" — 정상이지만 한국 기준 약간 불리";}
    else if(bmi<25){score=6;msg="BMI "+bmi.toFixed(1)+" — 외모 압박 체감 시작";}
    else if(bmi<28){score=8;msg="BMI "+bmi.toFixed(1)+" — 외모로 인한 불이익 상당함";}
    else{score=10;msg="BMI "+bmi.toFixed(1)+" — 한국 사회 외모 차별 강하게 체감";}
  }
  bodyScore=score;
  const col=score<=2?"#22c55e":score<=5?"#f59e0b":"#ef4444";
  preview.innerHTML='<span style="color:'+col+'">'+ msg +'</span><br><span style="font-size:.6rem;color:#71717a">총점에 +'+score+'점 반영됩니다</span>';
  btn.disabled=false;
}

function startQuiz(){
  totalScore+=bodyScore;
  document.getElementById("bodyinfo").style.display="none";
  document.getElementById("quiz").style.display="block";
  showQuestion(0);
}


function showQuestion(idx){
  const q = QUESTIONS[idx];
  document.getElementById('prog-count').textContent = `${idx+1} / 30`;
  document.getElementById('prog-fill').style.width = ((idx+1)/30*100)+'%';
  document.getElementById('q-category').textContent = q.cat;
  document.getElementById('q-num').textContent = `Q${idx+1}`;
  document.getElementById('q-text').textContent = q.text;

  const backBtn = document.getElementById('back-btn');
  if(current === 0) backBtn.classList.add('hidden');
  else backBtn.classList.remove('hidden');

  const letters = ['A','B','C','D','E','F'];
  document.getElementById('q-options').innerHTML = q.opts.map((o,i)=>`
    <button class="opt-btn" onclick="answer(${o.s}, '${q.cat}')">
      <span class="opt-letter">${letters[i]}</span>
      ${o.t}
    </button>
  `).join('');
}

function answer(score, cat){
  answerHistory.push({score, cat});
  totalScore += score;
  catScores[cat] = (catScores[cat]||0) + score;
  catCounts[cat] = (catCounts[cat]||0) + 1;

  current++;
  if(current >= QUESTIONS.length){
    showLoading();
  } else {
    showQuestion(current);
  }
}

function goBack(){
  if(current <= 0) return;
  const prev = answerHistory.pop();
  totalScore -= prev.score;
  catScores[prev.cat] = (catScores[prev.cat]||0) - prev.score;
  current--;
  showQuestion(current);
}

function showLoading(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('loading').style.display='block';
  setTimeout(showResult, 2000);
}

function showResult(){
  document.getElementById('loading').style.display='none';
  const scaledScore = Math.round(totalScore/300*100);
  const type = TYPES.find(t=>scaledScore>=t.min && scaledScore<=t.max) || TYPES[TYPES.length-1];
  renderResult(scaledScore, type);
}

      {max:100, msg:'직장이 삶을 갈아먹고 있는 수준입니다. 몸도 마음도 한계에 가까울 수 있습니다. 지금 당장 크게 바꾸지 못하더라도, 이 상황이 영원하지 않다는 것만큼은 잊지 않았으면 합니다.'},
    ],
    '🏠 주거': [
      {max:20, msg:'주거가 안정적입니다. 내 공간이 있다는 것, 쫓겨날 걱정이 없다는 것은 생각보다 훨씬 큰 심리적 안정을 줍니다. 그 안정 위에서 다른 것들을 꿈꿀 수 있다는 게 작은 일이 아닙니다.'},
      {max:50, msg:'주거 걱정이 아예 없진 않지만 그럭저럭 버티고 있습니다. 전세금, 월세, 대출 이자 중 하나쯤은 마음 한편을 무겁게 하고 있겠지만, 그래도 지금 이 순간 당신에게는 돌아갈 공간이 있습니다.'},
      {max:75, msg:'주거 불안이 상당합니다. 집이 안정되지 않으면 삶 전체가 흔들립니다. 매달 빠져나가는 주거비, 언제 나가야 할지 모르는 불안감. 그걸 안고 매일 출근하고 생활한다는 게 얼마나 힘든 일인지 압니다.'},
      {max:100, msg:'주거 문제가 삶의 가장 큰 짐 중 하나입니다. 안심하고 잠들 수 있는 공간이 보장되지 않는다는 건, 인간으로서 가장 기본적인 것이 흔들리는 상태입니다. 그 불안 속에서 버텨온 당신은 정말 강한 사람입니다.'},
    ],
    '❤️ 관계': [
      {max:20, msg:'관계가 든든합니다. 힘들 때 기댈 수 있는 사람, 기쁠 때 함께할 수 있는 사람이 있다는 것은 돈으로 살 수 없는 행운입니다. 그 관계들을 소중히 여기는 만큼 당신도 누군가에게 그런 사람이 되어주고 있을 겁니다.'},
      {max:50, msg:'평범하지만 나름 버텨주는 관계들이 있습니다. 완벽하진 않지만 완전히 혼자도 아닌 상태. 그 중간 어딘가에서 인간관계의 피로와 위로를 동시에 겪으며 살아가고 있습니다.'},
      {max:75, msg:'관계에서 외로움을 많이 느끼고 있습니다. 사람들 사이에 있어도 혼자인 느낌, 도움을 청하고 싶어도 마땅한 사람이 없는 상황. 그 외로움이 삶의 다른 피로감을 몇 배로 키운다는 걸 압니다.'},
      {max:100, msg:'관계로 인한 상처가 깊습니다. 가족이든 연인이든 친구든, 가까운 사람에게 받은 상처는 오래 남습니다. 그 상처를 안고도 매일을 살아가고 있는 당신에게, 당신은 생각보다 훨씬 더 강한 사람이라고 말해주고 싶습니다.'},
    ],
    '🧠 멘탈·건강': [
      {max:20, msg:'몸과 마음이 건강합니다. 건강은 모든 것의 기반입니다. 지금 이 상태를 당연하게 여기지 말고, 앞으로도 잘 유지하길 바랍니다. 건강한 몸과 마음이 있는 한 어떤 어려움도 헤쳐나갈 수 있습니다.'},
      {max:50, msg:'완전히 건강하진 않지만 그럭저럭 버티고 있습니다. 스트레스가 쌓이고 가끔 몸에 신호가 오기도 하겠지만, 아직 일상을 유지하고 있습니다. 몸이 보내는 신호를 조금 더 귀 기울여 들어주세요.'},
      {max:75, msg:'정신적으로, 혹은 신체적으로 많이 소진되어 있습니다. 티가 안 나서 그렇지 속으로는 꽤 지쳐 있을 겁니다. 버티는 것도 중요하지만, 지금 당신에게 가장 필요한 건 잠깐의 쉼일 수 있습니다.'},
      {max:100, msg:'몸과 마음이 한계에 가까운 상태입니다. 이 점수가 나왔다면 지금 당신은 정말 많이 힘든 상황일 겁니다. 혼자 모든 걸 감당하려 하지 마세요. 작은 도움이라도 받을 수 있는 곳을 찾아보길 진심으로 권합니다.'},
    ],
  };

  function getCatComment(key, score) {
    const list = catComments[key] || [];
    return (list.find(c => score <= c.max) || list[list.length-1]).msg;
  }

  const breakdownHTML = isShared ? '<div style="font-size:0.75rem;color:#71717a;text-align:center;padding:10px">카테고리별 점수는 직접 테스트해야 볼 수 있어요!</div>' : cats.map(c=>{
    const raw = catScores[c.key]||0;
    const p = Math.round(raw/c.max*100);
    return `
      <div class="bk-card">
        <div class="bk-cat">${c.label}</div>
        <div class="bk-score" style="color:${c.color}">${p}<span style="font-size:.6rem;color:var(--muted)">/100</span></div>
        <div class="bk-bar" style="width:${p}%;background:${c.color}"></div>
      </div>`;
  }).join('');

  // 카테고리별 코멘트 카드 (별도로 렌더링)
  const catCommentHTML = isShared ? '' : cats.map(c=>{
    const raw = catScores[c.key]||0;
    const p = Math.round(raw/c.max*100);
    const comment = getCatComment(c.key, p);
    return `
      <div style="background:#111113;border:1px solid #222226;border-radius:10px;padding:14px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:0.65rem;font-weight:700;color:${c.color};background:${c.color}22;padding:2px 8px;border-radius:20px;border:1px solid ${c.color}44">${c.label}</span>
          <span style="font-size:0.65rem;color:#71717a">${p}점</span>
        </div>
        <div style="font-size:0.75rem;line-height:1.8;color:#adbac7">${comment}</div>
      </div>`;
  }).join('');

  const famousHTML = pickRandom(type.famousPool, 3).map(f=>`
    <div class="famous-item">
      <span class="famous-emoji">${f.e}</span>
      <div>
        <div class="famous-name">${f.name}</div>
        <div class="famous-desc">${f.desc}</div>
      </div>
    </div>`).join('');

  document.getElementById('result').innerHTML = `
    <div class="result-header">
      <div class="result-badge" style="background:${type.badgeColor};color:${type.badgeText};border:1px solid ${type.badgeText}44">
        ${type.grade}
      </div>
      <div style="font-size:3rem;margin-bottom:10px">${type.emoji}</div>
      <div class="result-type-name">${type.name.replace('\n','<br>')}</div>
      <div class="result-type-sub">${type.sub}</div>
    </div>

    <div class="diff-meter">
      <div class="diff-label">인생 난이도 점수</div>
      <div class="diff-score-wrap">
        <span class="diff-score-big" style="color:${type.gradeColor}">${scaledScore}</span>
        <span class="diff-score-max"> / 100</span>
      </div>
      <div class="diff-bar-bg">
        <div class="diff-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,#22c55e,${type.gradeColor})"></div>
      </div>
      <div class="diff-grade" style="color:${type.gradeColor}">${type.grade}</div>
    </div>

    <div class="breakdown">${breakdownHTML}</div>

    <div class="desc-card">
      <h3>📋 판독 결과</h3>
      <div class="desc-text">${type.desc}</div>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid #222;font-size:0.78rem;line-height:1.9;color:#adbac7">
        ${getPersonalMsg(scaledScore)}
      </div>
    </div>

    <div class="desc-card" style="margin-bottom:12px">
      <h3>📊 카테고리별 분석</h3>
      <div style="margin-top:10px">${catCommentHTML}</div>
    </div>

    <div class="famous-card">
      <h3>🙌 비슷한 유형의 인물</h3>
      <div class="famous-list">${famousHTML}</div>
    </div>

    <button class="share-btn" onclick="copyResult('${type.name.replace('\n','')}', ${scaledScore})">🔗 내 결과 링크 복사하기</button>
    <button class="retry-btn" onclick="location.href=location.href.split('?')[0]">📝 나도 테스트하기</button>
  `;


}

function copyResult(name, score){
  const typeIdx = TYPES.findIndex(t=>score>=t.min && score<=t.max);
  const baseUrl = window.location.href.split('?')[0];
  const shareUrl = baseUrl + '?score=' + score + '&type=' + typeIdx;
  const text = '🇰🇷 한국인 인생 난이도 판독기\n\n내 유형: ' + name + '\n난이도 점수: ' + score + '/100\n\n👉 내 결과 보기: ' + shareUrl;
  navigator.clipboard.writeText(text).then(()=>{
    alert('결과가 복사됐습니다! 카톡에 붙여넣기 해서 공유해보세요 😊');
  }).catch(()=>{
    prompt('아래 링크를 복사하세요:', shareUrl);
  });
}

// 페이지 로드 시 URL 파라미터 확인해서 결과 바로 표시
function checkSharedResult(){
  const params = new URLSearchParams(window.location.search);
  const score = params.get('score');
  const typeIdx = params.get('type');
  if(score !== null && typeIdx !== null){
    document.getElementById('intro').style.display='none';
    const scaledScore = parseInt(score);
    const type = TYPES[parseInt(typeIdx)] || TYPES[TYPES.length-1];
    renderResult(scaledScore, type);
  }
}
checkSharedResult();
